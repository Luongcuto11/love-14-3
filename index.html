<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Gửi Em ❤️</title>

<style>
body{
    margin:0;
    height:100vh;
    background:linear-gradient(135deg,#ff758c,#ff7eb3);
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    font-family:Arial;
    overflow:hidden;
}

h1{
    color:white;
    font-size:45px;
}

p{
    color:white;
    font-size:24px;
    text-align:center;
    max-width:600px;
}

.heart{
    position:absolute;
    font-size:30px;
    animation:bay 6s linear infinite;
}

@keyframes bay{
    0%{
        transform:translateY(100vh);
        opacity:1;
    }
    100%{
        transform:translateY(-10vh);
        opacity:0;
    }
}
</style>

</head>

<body>

<h1>Gửi Em ❤️</h1>

<p>
14/3 đến rồi, anh chỉ muốn nói rằng em luôn là điều ngọt ngào nhất trong cuộc đời anh.
    Cảm ơn em vì đã yêu anh, ở bên anh và cùng anh tạo nên những kỷ niệm đẹp.
    Mong rằng chúng ta sẽ luôn nắm tay nhau thật lâu. 💕
</p>

<script>

function taoTim(){

    var heart = document.createElement("div");

    heart.className="heart";

    heart.innerHTML="❤️";

    heart.style.left=Math.random()*100+"vw";

    heart.style.fontSize=(Math.random()*30+20)+"px";

    document.body.appendChild(heart);

    setTimeout(()=>{
        heart.remove();
    },6000);
}

setInterval(taoTim,300);

</script>

</body>
</html>
