<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Gửi Em ❤️</title>

<style>
body{
    margin:0;
    height:100vh;
    background:linear-gradient(135deg,#ff758c,#ff7eb3);
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    font-family:Arial;
    overflow:hidden;
}

h1{
    color:white;
    font-size:45px;
}

p{
    color:white;
    font-size:24px;
    text-align:center;
    max-width:600px;
}

.heart{
    position:absolute;
    font-size:30px;
    animation:bay 6s linear infinite;
}

@keyframes bay{
    0%{
        transform:translateY(100vh);
        opacity:1;
    }
    100%{
        transform:translateY(-10vh);
        opacity:0;
    }
}
</style>

</head>

<body>

<h1>Gửi Em ❤️</h1>

<p>
Chúc em một ngày 14/3 thật ngọt ngào.  
Cảm ơn em vì đã đến bên anh.  
Mong rằng chúng ta sẽ luôn bên nhau thật lâu.  
Anh yêu em rất nhiều 💕
</p>

<script>

function taoTim(){

    var heart = document.createElement("div");

    heart.className="heart";

    heart.innerHTML="❤️";

    heart.style.left=Math.random()*100+"vw";

    heart.style.fontSize=(Math.random()*30+20)+"px";

    document.body.appendChild(heart);

    setTimeout(()=>{
        heart.remove();
    },6000);
}

setInterval(taoTim,300);

</script>

</body>
</html>
